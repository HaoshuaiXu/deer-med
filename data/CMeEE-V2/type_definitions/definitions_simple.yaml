疾病: |
  疾病是指导致病人处于非健康状态的原因或者医生对病人做出的诊断。
临床表现: |
  临床表现是疾病的表现，指患者不适感觉以及通过检查得知的异常表现。
医疗程序: |
  医疗程序指为诊断或治疗所采取的措施、方法及过程。
医疗设备: |
  医疗设备指为诊断或治疗所使用的工具、器具、仪器等。
药物: |
  药物是指用来预防、治疗及诊断疾病的物质。
医学检验项目: |
  医学检验项目是指检查涉及到的体液检查项目、重要生理指标以及其他检查项目。
身体: |
  身体指细胞、组织、及位于人体特定区域的由细小物质成分组合而成的结构、器官、系统、肢体。
科室: |
  科室主要是指医院或医疗机构所设有的科室。
微生物类: |
  微生物类包括细菌、病毒、真菌以及一些小型的原生生物、显微藻类等在内的一大类生物群体。