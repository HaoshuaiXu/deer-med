疾病: |
  疾病是指导致病人处于非健康状态的原因或者医生对病人做出的诊断，并且是能够被治疗的，包括疾病或综合征、中毒或受伤、器官或细胞受损。
临床表现: |
  临床表现是疾病的表现，泛指患者不适感觉以及通过检查得知的异常表现，主要包括症状、体征。
医疗程序: |
  医疗程序泛指为诊断或治疗所采取的措施、方法及过程。主要包括检查程序、治疗或预防程序。
医疗设备: |
  医疗设备泛指为诊断或治疗所使用的工具、器具、仪器等，主要包括检查设备、治疗设备。
药物: |
  药物是指用来预防、治疗及诊断疾病的物质。
医学检验项目: |
  医学检验项目是指检查涉及到的体液检查项目、重要生理指标以及其他检查项目，“医疗检验项目”主要针对人体而言，是能够通过设备或实验检测出的项目，并且是能够被量化，有其对应的测量值或指标值。
身体: |
  身体泛指细胞、组织、及位于人体特定区域的由细小物质成分组合而成的结构、器官、系统、肢体，另外包括身体产生或解剖身体产生的物质等，主要包括身体部位、身体物质。
科室: |
  科室主要是指医院或医疗机构所设有的科室。
微生物类: |
  微生物类包括细菌、病毒、真菌以及一些小型的原生生物、显微藻类等在内的一大类生物群体，另外包括微生物类产生的毒素、激素、酶等。